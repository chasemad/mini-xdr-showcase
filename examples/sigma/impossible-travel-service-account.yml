title: Impossible Travel by Service Account
id: 0c49ee7d-87d5-47fd-aed6-demo0000002
status: experimental
description: Flags synthetic service account authentication from distant regions within an unrealistic time window.
author: Mini-XDR Showcase
date: 2026/05/14
references:
  - https://attack.mitre.org/techniques/T1078/
logsource:
  product: identity
  service: authentication
detection:
  selection_service_account:
    user.name|startswith:
      - 'svc-'
      - 'app-'
  selection_success:
    activity_name: 'User Login'
    status: 'Success'
  timeframe: 30m
  condition: selection_service_account and selection_success
fields:
  - event_time
  - user.name
  - src_endpoint.ip
  - src_endpoint.location.country
  - device.name
  - tenant_id
falsepositives:
  - Identity provider egress through globally distributed proxies.
  - Approved workload migration or disaster recovery test.
  - Service account used by a vendor integration with rotating egress.
level: medium
tags:
  - attack.persistence
  - attack.t1078
mini_xdr:
  tenant_id: tenant-demo
  normalized_category: authentication
  correlation_required: true
  response_hint: require_owner_validation
